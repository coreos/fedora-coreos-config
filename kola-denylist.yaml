# This file documents currently known-to-fail kola tests. It is consumed by
# coreos-assembler to automatically skip some tests. For more information,
# see: https://github.com/coreos/coreos-assembler/pull/866.
- pattern: fcos.internet
  tracker: https://github.com/coreos/coreos-assembler/pull/1478
- pattern: podman.workflow
  tracker: https://github.com/coreos/coreos-assembler/pull/1478
- pattern: coreos.boot-mirror*
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/1659
  warn: true
  arches:
    - ppc64le
- pattern: kdump.crash.ssh
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/1813
  streams:
    - rawhide
    - branched
    - next-devel
    - next
- pattern: ext.config.boot.bootupd-validate
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/1788
  snooze: 2024-11-18
  streams:
    - stable
    - testing
    - testing-devel
    - next
